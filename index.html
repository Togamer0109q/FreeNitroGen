<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Entrar</title>

<style>
html,body{
  margin:0;
  padding:0;
  overflow:hidden;
  background:black;
  font-family:sans-serif;
}

/* video */
iframe{
  position:fixed;
  top:0;
  left:0;
  width:100vw;
  height:100vh;
  border:none;
  filter: blur(20px);
  transition: filter 0.6s;
}

/* pantalla de entrada */
#pantalla{
  position:fixed;
  top:0;
  left:0;
  width:100vw;
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:rgba(0,0,0,0.6);
  z-index:10;
}

/* texto */
#boton{
  color:white;
  font-size:40px;
  background:rgba(0,0,0,0.5);
  padding:20px 40px;
  border-radius:15px;
  cursor:pointer;
  transition:0.3s;
}

#boton:hover{
  transform:scale(1.1);
}
</style>

</head>
<body>

<iframe id="video"
src="https://www.youtube.com/embed/q3sUHAeeOqE?controls=0&loop=1&playlist=q3sUHAeeOqE&enablejsapi=1"
allow="autoplay; encrypted-media; fullscreen"
allowfullscreen>
</iframe>

<div id="pantalla">
  <div id="boton">Haz click para entrar</div>
</div>

<script src="https://www.youtube.com/iframe_api"></script>

<script>

let player;

function onYouTubeIframeAPIReady(){
  player = new YT.Player('video');
}

document.getElementById("pantalla").onclick = () => {

  // quitar blur
  document.getElementById("video").style.filter = "blur(0px)";

  // quitar overlay
  document.getElementById("pantalla").style.display = "none";

  // reproducir con audio
  if(player){
    player.playVideo();
  }

  // pantalla completa
  const el = document.documentElement;
  if(el.requestFullscreen){
    el.requestFullscreen();
  }

}

</script>

</body>
</html>

</body>
</html>
